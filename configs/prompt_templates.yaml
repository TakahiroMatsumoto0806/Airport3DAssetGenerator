# =============================================================================
# プロンプトテンプレート定義
# AL3DG — T-1.1
# =============================================================================
# 属性軸: タイプ / 色 / 材質 / テクスチャ / スタイル / 状態
# FLUX.1-schnell 向け英語プロンプト
# =============================================================================

# ---- 固定部分（全プロンプト共通）----
# TRELLIS 3D再構成に最適化した撮影条件:
#   - 被写体が画面60-80%を占める大きめの構図
#   - 正面寄りのカメラ（俯瞰・煽り禁止）
#   - 影なし・グラデーションなし・単色背景
#   - シャープなエッジ（ブラー禁止）
#
# ★ FLUX.1-schnell の CLIP エンコーダは 77 トークン制限あり
#   プロンプト先頭に「フレーミング + オブジェクト説明 + 背景色」を配置して
#   CLIP に確実に届くようにする。残りは T5 エンコーダが処理する。
#
# _build_prompt() でプロンプトを以下の順に組み立てる:
#   [prefix: フレーミング] [type] [color] [material] [texture] [style] [condition]
#   [bg_brief: 背景色のみ] [suffix_full: 詳細指示（T5向け）]
fixed:
  # CLIP の 77 トークン枠内に収まるよう先頭に置くフレーミング指示（短く保つこと）。
  # この指示が「荷物を画面いっぱいに大きく写す」という構図を CLIP に伝える。
  # 変更すると全プロンプトの構図が変わる。例えば "small object" にすると荷物が小さく写り、
  # TRELLIS の再構成品質が低下する。
  prefix: "single product photo, object centered"

  # CLIP に届かせる背景指示（トークン節約のため短く）。
  # "solid white background, no shadows" が TRELLIS に最適な白背景・無影を指示する。
  # 変更すると背景色が変わる。グレー背景にすると影との区別が難しくなり 3D 品質が落ちる。
  bg_brief: "solid white background, no shadows, sharp focus"

  # T5 エンコーダ向けの詳細な照明指示（CLIP トークン制限の後半に配置）。
  # 物体自体の陰影（shading）は3D形状把握に有益なため残す。
  # 背景への落ち影（background shadow）のみ禁止（TRELLISのメッシュ汚染を防ぐ）。
  lighting: "flat even studio lighting, no background shadows"

  # カメラアングルの指示。
  # "frontal view slightly above eye level" = 正面やや上からの視点（TRELLIS が最も得意な角度）。
  # "entire object fully visible not cropped" = 切れないよう全体を写す。
  # 変更すると撮影アングルが変わり、生成された 3D メッシュの品質に直接影響する。
  view: "frontal view slightly above eye level, entire object fully visible not cropped, centered"

  # 画質の指示（T5 エンコーダ向け）。
  # シャープなエッジを要求することで TRELLIS がメッシュのエッジを正確に認識できる。
  # 変更・削除すると滑らかすぎる・ぼやけた画像が生成されメッシュの輪郭精度が下がる。
  quality: "ultra sharp focus, no depth of field blur, crisp clean edges, photorealistic"

  # FLUX.1-schnell は negative prompt 非対応のため空文字で固定。変更不可。
  negative_hint: ""

# ---- 淡色リスト（白背景と同化しやすい色）----
# ここに列挙された色が選ばれた場合、_build_prompt() が自動で
# 「荷物の輪郭を強調する」補足指示をプロンプトに追加する。
# これにより白背景に溶け込みやすい薄色の荷物でも輪郭が明確に生成される。
# 新しい淡色（例: "pale_pink", "light_blue"）を追加すると、その色の荷物にも輪郭強調が適用される。
light_colors:
  - "white"
  - "ivory"
  - "cream"
  - "beige"
  - "off-white"
  - "pearl"
  - "champagne"
  - "silver"
  - "light gray"

# ---- 属性軸バリエーション ----
# ここの選択肢が画像生成プロンプトの「素材」となる。
# 選択肢を増やすと生成される画像の多様性が上がる。
# 選択肢を減らすと特定の種類に特化したデータセットになる。
attributes:

  # -- タイプ（luggage_categories.yaml と対応）--
  # 各カテゴリ → サブカテゴリ → 具体的な英語説明文（FLUX.1-schnell へのプロンプト）の構造。
  # 説明文を追加・変更するとその種類の荷物画像が生成されるようになる。
  # カテゴリを丸ごと削除するとそのカテゴリは一切生成されなくなる。
  # ※ sampling.category_weights との整合を保つこと（削除したカテゴリの重みも削除する）。
  type:
    hard_suitcase:
      medium_check_in:
        - "medium hard-shell checked suitcase with four spinner wheels"
        - "hard-shell travel suitcase with expandable zipper"
        - "mid-size polycarbonate suitcase with telescoping handle"
      large_check_in:
        - "large hard-shell checked luggage with four spinner wheels"
        - "large hard-shell suitcase with double spinner wheels and TSA lock"
        - "large polycarbonate travel suitcase with corner guards"
      extra_large:
        - "extra-large hard-shell checked suitcase with four spinner wheels"
        - "oversized hard-shell travel trunk with TSA lock and spinner wheels"
        - "extra-large polycarbonate suitcase with expandable zipper and spinner wheels"
    soft_suitcase:
      medium_check_in:
        - "medium soft-shell suitcase with multiple compartments"
        - "expandable soft fabric checked luggage with spinner wheels"
      large_check_in:
        - "large soft-shell checked bag with reinforced corners and spinner wheels"
        - "large expandable fabric suitcase with compression straps"
      extra_large:
        - "extra-large soft-shell checked bag with spinner wheels and compression straps"
        - "oversized expandable fabric suitcase with reinforced handles"
        - "extra-large soft fabric travel suitcase with four wheels"
    backpack:
      medium_travel:
        - "large travel backpack with hip belt and rain cover"
        - "travel backpack with multiple compartments and padded back panel"
        - "35-liter travel backpack with hip belt and sternum strap"
      large_travel:
        - "large 60-liter travel backpack with compression straps and hip belt"
        - "large hiking backpack with ventilated back system"
        - "large travel backpack with external attachment points"
      extra_large:
        - "extra-large trekking backpack with external frame and hip belt"
        - "mountaineering backpack with ice axe loops and crampon holder"
        - "80-liter expedition backpack with frame sheet and load lifters"
    duffel_bag:
      medium:
        - "medium travel duffel bag with wheels and telescoping handle"
        - "cylindrical duffel bag with multiple handles"
      large:
        - "large wheeled duffel bag for sports equipment"
        - "oversized canvas duffel with padded straps"
      extra_large:
        - "extra-large expedition duffel bag with backpack straps"
        - "oversized cargo duffel bag for heavy equipment"
    cardboard_box:
      medium_box:
        - "medium brown cardboard box with fragile sticker"
        - "double-wall corrugated shipping box"
      large_box:
        - "large brown cardboard moving box"
        - "oversized corrugated cardboard freight box"
      extra_large_box:
        - "extra-large double-wall corrugated cardboard freight box"
        - "oversized heavy-duty cardboard shipping crate"
    hard_case:
      pelican_style:
        - "waterproof hard plastic case with foam interior and latches"
        - "rugged protective equipment case with pressure valve"
      equipment_case:
        - "large aluminum equipment flight case with wheels"
        - "road case with butterfly latches and stackable design"
    golf_bag:
      stand_bag:
        - "lightweight golf stand bag with dual strap"
        - "golf carry bag with tripod stand"
      cart_bag:
        - "full-size golf cart bag with multiple dividers"
        - "14-way cart bag with rain hood"
      travel_cover:
        - "golf travel bag with wheels and padded top"
        - "hard-shell golf travel case"
    instrument_case:
      guitar_case:
        - "hard-shell guitar case with velvet interior"
        - "semi-rigid acoustic guitar gig bag"
      violin_case:
        - "hard-shell violin case with bow holder"
        - "rectangular violin case with combination lock"

  # -- 色 --
  # 各グループの色からランダムにサンプリングされ、プロンプトに組み込まれる。
  # グループへの追加: 新しい色（英語名）を追加すると、その色の荷物が生成されるようになる。
  # グループの削除: そのグループの色が一切使われなくなる（sampling.color_weights との整合注意）。
  # 淡い色（白・シルバーなど）を追加する場合は light_colors にも追記すること。
  color:
    neutrals:
      - "black"
      - "matte black"
      - "glossy black"
      - "charcoal gray"
      - "dark gray"
      - "light gray"
      - "silver"
      - "white"
      - "off-white"
      - "beige"
      - "cream"
    blues:
      - "navy blue"
      - "midnight blue"
      - "cobalt blue"
      - "sky blue"
      - "teal"
      - "dark teal"
    reds_pinks:
      - "red"
      - "crimson"
      - "burgundy"
      - "rose gold"
      - "coral"
      - "hot pink"
    greens:
      - "olive green"
      - "army green"
      - "forest green"
      - "mint green"
    browns_golds:
      - "tan"
      - "brown"
      - "dark brown"
      - "camel"
      - "champagne gold"
      - "bronze"
    others:
      - "purple"
      - "lavender"
      - "orange"
      - "yellow"

  # -- 材質（見た目の記述、material_properties.yaml と対応）--
  # ここで選ばれた材質の英語名がプロンプトに組み込まれ、
  # 画像の見た目（艶・質感・色合い）に影響する。
  # また、VLM が画像から材質を推定する際の参照にもなる。
  # material_properties.yaml に対応エントリがない材質を追加した場合は
  # そのカテゴリのデフォルト材質（composite_xxx）が物理プロパティに使われる。
  material:
    hard_plastics:
      polycarbonate:
        - "polycarbonate shell"
        - "hard polycarbonate surface"
        - "semi-gloss polycarbonate"
      abs_plastic:
        - "ABS plastic shell"
        - "hard ABS surface with slight sheen"
      aluminum:
        - "brushed aluminum"
        - "anodized aluminum"
        - "polished aluminum"
    soft_fabrics:
      nylon:
        - "nylon fabric"
        - "ripstop nylon"
        - "ballistic nylon"
        - "600D nylon"
      polyester:
        - "polyester fabric"
        - "high-density polyester"
        - "woven polyester"
      canvas:
        - "canvas fabric"
        - "waxed canvas"
        - "heavy-duty canvas"
      cordura:
        - "Cordura nylon"
        - "abrasion-resistant Cordura fabric"
    leathers:
      genuine_leather:
        - "genuine leather"
        - "full-grain leather"
        - "pebbled leather"
        - "smooth leather"
      synthetic_leather:
        - "vegan leather"
        - "PU leather"
        - "faux leather"
    cardboard:
      - "corrugated cardboard"
      - "brown kraft cardboard"

  # -- テクスチャ --
  # 表面の細かい質感を指定する。材質に重ねてプロンプトに追加される。
  # 追加すると表面の見た目（ツヤ・模様・織り目）のバリエーションが増える。
  # "worn"（使用感あり）系を増やすと古びた荷物の画像が増え、
  # ロボットが現実の空港で遭遇するような多様な状態を学習できる。
  texture:
    smooth:
      - "smooth surface"
      - "glossy finish"
      - "matte finish"
      - "satin finish"
    textured:
      - "ribbed texture"
      - "diamond-pattern texture"
      - "cross-hatch pattern"
      - "brushed texture"
      - "embossed pattern"
    fabric:
      - "woven texture"
      - "herringbone weave"
      - "plain weave"
      - "twill weave"
    worn:
      - "slightly worn"
      - "travel-worn with minor scuffs"
      - "well-used with character marks"

  # -- スタイル --
  # 荷物のデザインコンセプトを指定する。形状の雰囲気（角の丸み・全体シルエット）に影響する。
  # "luxury" を増やすと高級ブランド風のシルエットが多くなる。
  # "sporty" を増やすとアウトドア・機能性重視の形状が多くなる。
  style:
    modern:
      - "modern minimalist design"
      - "contemporary sleek design"
      - "clean geometric shape"
    classic:
      - "classic vintage style"
      - "traditional design"
      - "timeless elegant look"
    sporty:
      - "sporty athletic design"
      - "outdoor rugged style"
      - "adventure travel style"
    luxury:
      - "premium luxury design"
      - "high-end designer style"
      - "sophisticated upscale look"
    casual:
      - "casual everyday style"
      - "relaxed practical design"

  # -- 状態 --
  # 荷物の使用度合いを指定する。表面の傷・汚れ・くたびれ具合の表現に影響する。
  # "worn" の割合（sampling.condition_weights）を増やすと、
  # 実際の空港でよく見かける使い込まれた荷物の画像が増える。
  # "new" を多くすると綺麗な商品写真に近い画像が増え、3D テクスチャが均一になりやすい。
  # フレーズ数: new×2 / used×5 / worn×10
  # worn はステッカー系5種・汚れ・色あせ系5種で多様な使用感を表現
  # ※ 物理的な傷・穴・亀裂・へこみは3Dメッシュの穴あきにつながるため除外
  condition:
    new:
      - "brand new, pristine, no marks or scratches"
      - "unused, mint condition, factory fresh surface"
    used:
      - "lightly used with minor surface scuffs"
      - "well-traveled with small scratches and light wear"
      - "used with normal wear and slight color fading"
      - "moderately worn from regular travel use"
      - "gently used, handling marks on corners and edges"
    worn:
      # ステッカー・デカール系（5種）
      - "covered in colorful travel stickers from multiple countries"
      - "surface layered with destination stickers and faded airline tags"
      - "heavily stickered with country flag decals, some peeling at edges"
      - "plastered with city souvenir stickers and tour decals across the body"
      - "worn surface with sticker residue, ghost marks from removed labels"
      # 汚れ・色あせ系（5種）— 物理損傷・穴あき表現は除外
      - "heavily soiled with dirt stains and travel grime across the surface"
      - "faded and sun-bleached color with uneven discoloration patches"
      - "surface darkened by dirt buildup and accumulated travel grime"
      - "color faded and blotchy from prolonged use and light exposure"
      - "grimy surface with muddy stains and worn-off color patches"

# ---- プロンプト組み立てテンプレート ----
# 上記の属性軸を組み合わせて最終的な英語プロンプト文字列を作る雛形。
# {type}, {color}, {material} などのプレースホルダーに各属性値が埋め込まれる。
# 固定部分（prefix, bg_brief, lighting, view, quality）は _build_prompt() が自動付加する。
# ※ 現在のパイプラインでは Qwen3-VL-32B によるリファインが入るため、
#   組み立て後のプロンプトはさらに最適化・圧縮される（vllm.enabled=true 時）。
templates:
  standard: >-
    {type}, {color}, {material}, {texture}, {style}, {condition},
    {fixed.background}, {fixed.lighting}, {fixed.view}, {fixed.quality}

  minimal: >-
    {type}, {color}, {material},
    {fixed.background}, {fixed.lighting}, {fixed.quality}

  detailed: >-
    {type} in {color} with {material} construction,
    {texture}, {style}, {condition},
    isolated on {fixed.background}, {fixed.lighting},
    {fixed.view}, {fixed.quality}, no shadows outside object

# ---- カテゴリ別プロンプト先頭強制フレーズ ----
# ---- CLIP 先頭保証フレーズ（ベースプロンプト先頭に付加）----
# 組合せ生成したベースプロンプトの「前に」付加する超短縮状態フレーズ。
# CLIP の 77 トークン枠の先頭にハンドル格納・バッグ閉鎖指示が必ず届くことを保証する。
# 短く保つこと（5語以内推奨）。長すぎると他の重要情報が CLIP 枠から押し出される。
# 未設定カテゴリには付加しない（バッグ以外の形状には telescoping handle がないため）。
category_clip_prefix:
  hard_suitcase:   "hard suitcase handle fully retracted and stowed, all zippers closed, bag completely sealed,"
  soft_suitcase:   "soft suitcase handle fully retracted and stowed, all zippers closed, bag completely sealed,"
  golf_bag:        "zipped and sealed,"
  ski_bag:         "zipped closed,"
  backpack:        "straps tucked, zipped,"
  duffel_bag:      "zipper closed,"
  hard_case:       "latches locked,"
  instrument_case: "closed, only case,"
  cardboard_box:   "sealed,"


# ---- サンプリング設定 ----
sampling:
  # 色グループの選ばれやすさ（重み）。値の比率がサンプリング確率になる（合計が1.0になるよう設定）。
  # neutrals（黒・グレー系）が最も多いのは実際の空港荷物の色分布を反映しているため。
  # 特定の色を増やしたい場合はその値を大きくする。
  # 例: blues を 0.30 にすると青系の荷物が約3割を占めるデータセットになる。
  color_weights:
    neutrals: 0.40   # 黒・グレー系が最も多い
    blues: 0.20
    reds_pinks: 0.15
    greens: 0.10
    browns_golds: 0.10
    others: 0.05

  # 荷物の状態（新品・使用済み・使い込み）の選ばれやすさ（重み）。
  # 比率 new:used:worn = 1:6:3。空港での実際の荷物分布に近づけ、
  # used/worn の多様な表面状態を学習データに多く含めるための設定。
  condition_weights:
    new: 0.30
    used: 0.40
    worn: 0.30

  # 荷物カテゴリの生成比率（合計が 1.0 になるよう設定）。
  # hard_suitcase が最多なのは空港の受託荷物で最も頻繁に登場するカテゴリだから。
  # 特定カテゴリのアセットを集中して収集したい場合はその値を大きくする。
  # ※ type の keys に存在しないカテゴリを追加しても無視される（attributes.type との整合注意）。
  # ※ briefcase は機内持ち込みサイズのため除外済み。
  category_weights:
    hard_suitcase: 0.60
    soft_suitcase: 0.20
    backpack: 0.07
    duffel_bag: 0.05
    cardboard_box: 0.03
    hard_case: 0.02
    golf_bag: 0.01
    instrument_case: 0.01
    ski_bag: 0.01

  # サブカテゴリのサイズ比率（合計が 1.0 になるよう設定）。
  # 設定されたカテゴリは重み付きランダムサンプリングでサブカテゴリを選択する。
  # 未設定のカテゴリは均等サンプリング。
  # 比率 1:4:5 = medium 10% : large 40% : extra_large 50%
  subcategory_size_weights:
    hard_suitcase:
      medium_check_in: 0.1
      large_check_in:  0.4
      extra_large:     0.5
    soft_suitcase:
      medium_check_in: 0.1
      large_check_in:  0.4
      extra_large:     0.5
    backpack:
      medium_travel: 0.1
      large_travel:  0.4
      extra_large:   0.5
    duffel_bag:
      medium:      0.1
      large:       0.4
      extra_large: 0.5
    cardboard_box:
      medium_box:      0.1
      large_box:       0.4
      extra_large_box: 0.5
