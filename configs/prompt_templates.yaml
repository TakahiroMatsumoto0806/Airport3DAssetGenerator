# =============================================================================
# プロンプトテンプレート定義
# AL3DG — T-1.1
# =============================================================================
# 属性軸: タイプ / 色 / 材質 / テクスチャ / スタイル / 状態
# FLUX.1-schnell 向け英語プロンプト
# =============================================================================

# ---- 固定部分（全プロンプト共通）----
fixed:
  background: "on pure white background"
  lighting: "studio lighting, soft shadows"
  view: "product photography, slightly elevated angle"
  quality: "high quality, sharp focus, photorealistic"
  # FLUX.1-schnell は guidance_scale=0.0 のため、シンプルで明確な記述が効果的
  negative_hint: ""  # FLUX.1-schnell は negative prompt 非対応

