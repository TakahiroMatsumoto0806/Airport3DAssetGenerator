# ---- プロンプト組み立てテンプレート ----
# {type}, {color}, {material}, {texture}, {style}, {condition} のプレースホルダー
# 固定部分は自動付加される
templates:
  standard: >-
    {type}, {color}, {material}, {texture}, {style}, {condition},
    {fixed.background}, {fixed.lighting}, {fixed.view}, {fixed.quality}

  minimal: >-
    {type}, {color}, {material},
    {fixed.background}, {fixed.lighting}, {fixed.quality}

  detailed: >-
    {type} in {color} with {material} construction,
    {texture}, {style}, {condition},
    isolated on {fixed.background}, {fixed.lighting},
    {fixed.view}, {fixed.quality}, no shadows outside object

  # LLM リファイン用ベーステンプレート（Qwen3-VL-32B に渡す）
  llm_refine_system: >-
    You are a professional product photographer and prompt engineer specializing
    in generating high-quality product images with FLUX.1-schnell diffusion model.
    Your task is to refine image generation prompts for airport luggage items.
    Output only the refined prompt, no explanations.

  llm_refine_user: >-
    /no_think
    Refine this product image prompt for FLUX.1-schnell.
    Keep it under 120 words. Preserve all factual attributes.
    Ensure it specifies: pure white background, studio lighting,
    product photography angle, photorealistic quality.
    Input prompt: {base_prompt}

# ---- サンプリング設定 ----
sampling:
  # combinatorial 生成時の属性選択重み（均等でない場合に調整）
  color_weights:
    neutrals: 0.40   # 黒・グレー系が最も多い
    blues: 0.20
    reds_pinks: 0.15
    greens: 0.10
    browns_golds: 0.10
    others: 0.05

  condition_weights:
    new: 0.50
    used: 0.35
    worn: 0.15

  # カテゴリごとの生成比率（合計 1.0）
  category_weights:
    hard_suitcase: 0.25
    soft_suitcase: 0.15
    backpack: 0.15
    duffel_bag: 0.10
    tote_bag: 0.08
    briefcase: 0.07
    cardboard_box: 0.06
    hard_case: 0.04
    golf_bag: 0.03
    stroller: 0.03
    instrument_case: 0.02
    ski_bag: 0.02
