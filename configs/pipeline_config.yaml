# =============================================================================
# AL3DG パイプライン設定
# T-6.1
# =============================================================================
# DGX Spark (Grace Blackwell GB10, 128GB 統合メモリ) 向けデフォルト設定
# 各ステップは逐次実行・モデルは1つずつロード
# =============================================================================

# ---- 基本設定 ----
project:
  name: "al3dg"
  output_dir: "outputs"
  seed: 42

# ---- 生成数 ----
generation:
  # 目標生成数（最終的に assets_final に残るアセット数）
  target_count: 1000
  # 各ステップでの生成倍率（歩留まりを考慮）
  image_batch_size: 4          # 一度に生成する画像数
  prompt_count_per_category: 10  # カテゴリあたりのプロンプト数

# ---- ステップ有効化フラグ ----
steps:
  t1_prompt_generation: true
  t2_image_generation: true
  t2_image_qa: true
  t3_mesh_generation: true
  t3_mesh_qa: true
  t3_mesh_vlm_qa: true
  t4_physics: true
  t4_sim_export: true

# ---- 出力ディレクトリ ----
paths:
  prompts_dir: "outputs/prompts"
  images_dir: "outputs/images"
  images_approved_dir: "outputs/images_approved"
  meshes_raw_dir: "outputs/meshes_raw"
  meshes_approved_dir: "outputs/meshes_approved"
  assets_final_dir: "outputs/assets_final"
  reports_dir: "outputs/reports"

# ---- モデル設定 ----
models:
  # FLUX.1-schnell (Text-to-Image)
  flux:
    model_id: "black-forest-labs/FLUX.1-schnell"
    model_dir: "~/models/FLUX.1-schnell"
    device: "cuda"
    dtype: "bfloat16"
    num_inference_steps: 4

  # TRELLIS.2 (Image-to-3D)
  trellis:
    model_dir: "~/models/TRELLIS-image-large"
    # TRELLIS.2 は別 conda 環境で実行すること
    # conda activate trellis && python scripts/run_step.py --step mesh_generation

  # Qwen3-VL-32B (VLM/LLM) — vLLM サーバーとして使用
  vlm:
    base_url: "http://localhost:8001/v1"
    model_name: "/home/ntt/models/Qwen3-VL-32B-Instruct"
    temperature: 0.1
    max_tokens: 2048
    # 起動コマンド:
    #   vllm serve Qwen/Qwen3-VL-32B-Instruct --dtype bfloat16

# ---- T-1.2: プロンプト生成 ----
prompt_generation:
  configs_dir: "configs"
  output_file: "outputs/prompts/prompts.json"
  seed: 42

# ---- T-2.1: 画像生成 ----
image_generation:
  output_dir: "outputs/images"
  width: 1024
  height: 1024
  num_inference_steps: 4
  guidance_scale: 0.0
  resume: true

# ---- T-2.2: 画像 QA ----
image_qa:
  output_dir: "outputs/images_approved"
  thresholds:
    realism: 7
    integrity: 7
  thinking_mode: false   # /no_think
  batch_size: 16
  resume: true

# ---- T-3.1: メッシュ生成 ----
mesh_generation:
  output_dir: "outputs/meshes_raw"
  seed: 42
  resume: true

# ---- T-3.2: メッシュ QA ----
mesh_qa:
  thresholds:
    min_faces: 5000
    max_faces: 100000
    max_aspect_ratio: 20.0
  repair: true
  output_dir: "outputs/meshes_approved"
  resume: true

# ---- T-3.3: VLM マルチビュー QA ----
mesh_vlm_qa:
  output_dir: "outputs/meshes_approved"
  render_dir: "outputs/renders"
  thresholds:
    geometry: 6
    texture: 5
  thinking_mode: true    # /think
  azimuths: [0, 90, 180, 270]
  render_size: [512, 512]
  resume: true

# ---- T-4.1: 物理プロパティ付与 ----
physics:
  output_dir: "outputs/assets_final"
  miniature: true
  resume: true
  # CoACD 凸分解パラメータ
  # ※ max_ch_vertex・resolution を上げるほど visual.glb に近い精度になるが
  #   Isaac Sim の物理演算（衝突判定）コストが上がる。
  #   1,000体同時シミュレーションでは低め（max_ch_vertex: 256）を推奨。
  coacd:
    threshold: 0.01        # 凸度閾値: 0.01〜1.0、小さいほど細かく分解
    max_convex_hull: 64    # 凸包の最大個数（-1 で無制限）
    max_ch_vertex: 2048    # 凸包1個あたりの最大頂点数（visual.glb は約 78,000頂点）
    resolution: 8000       # 分解解像度: 高いほど精密
    mcts_iterations: 300   # MCTS 探索反復数: 多いほど分解品質が上がる

# ---- T-4.2: シミュレータエクスポート ----
sim_export:
  # Isaac Sim USD エクスポートメタデータ JSON の保存先
  output_dir: "outputs/assets_final"
  resume: true

